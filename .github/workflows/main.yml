name: Build NETGEAR-BZV Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/configs/netgear-bzv.config'
      - 'Dockerfile'

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build OpenWrt Firmware
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          outputs: type=local,dest=firmware/
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netgear-bzv-firmware
          path: firmware/netgear-bzv-firmware.bin
          if-no-files-found: error
